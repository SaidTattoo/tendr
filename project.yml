name: Tendr
options:
  bundleIdPrefix: com.tendr
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: es
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  Tendr:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tendr.app
        CODE_SIGN_ENTITLEMENTS: App/Tendr.entitlements
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Tendr
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIBackgroundModes: "remote-notification"
    dependencies:
      - target: TendrWidget

  TendrWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
      - path: Shared
    info:
      path: Widget/Info.plist
      properties:
        CFBundlePackageType: XPC!
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tendr.app.widget
        CODE_SIGN_ENTITLEMENTS: Widget/TendrWidget.entitlements
        SKIP_INSTALL: YES
        INFOPLIST_KEY_CFBundleDisplayName: Tendr
